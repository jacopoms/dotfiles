"$schema" = 'https://starship.rs/config-schema.json'

format = """
[έΨΣέΨΤέΨΥ](#6272a4)\
[ ΌεΣ ](bg:#6272a4 fg:#282a36)\
[ΌΓ┤](bg:#bd93f9 fg:#6272a4)\
$directory\
[ΌΓ┤](fg:#bd93f9 bg:#44475a)\
$git_branch\
$git_state\
$git_status\
$git_metrics\
[ΌΓ┤](fg:#44475a bg:#282a36)\
[ΌΓ┤ ](fg:#282a36)\
\n$sudo\
$character"""

right_format = """
(fg:#44475a bg:#44475a)\
$aws\
$kubernetes\
$container\
$ruby\
$nodejs\
$elixir\
$stern\
$time\
$cmd_duration
"""
[directory]
style = "fg:#f8f8f2 bg:#bd93f9"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "

[git_branch]
symbol = "ΎΡα"
style = "bg:#44475a"
format = '[[ $symbol $branch ](fg:#bd93f9 bg:#44475a)]($style)'

[git_status]
style = "bg:#44475a"
format = '[[($all_status$ahead_behind )](fg:#bd93f9 bg:#44475a)]($style)'

[git_metrics]
format = "([+$added]($added_style))[]($added_style)"
added_style = "fg:#bd93f9 bg:#44475a"
deleted_style = "fg:#ff5555 bg:#44475a"
disabled = false

[git_state]
disabled = false

[time]
disabled = false
time_format = "%R"                                      # Hour:Minute Format
style = "bg:#282a36"
format = '[[ ΎΡ║ $time ](fg:#6272a4 bg:#282a36)]($style)'

[cmd_duration]
format = "[ ΎΚΥ $duration ]($style)"
style = "fg:#f8f8f2 bg:#44475a"
disabled = false


### General Options
set-option -gq utf8
set-option -g visual-activity on
set-option -g status-position top
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g focus-events on
set-option -g default-terminal "tmux-256color"
set-option -as terminal-features ",xterm-256color:RGB"
set-option -as terminal-features ",wezterm:RGB"
set-option -as terminal-features ",ghostty:RGB"
set-option -as terminal-features ",xterm-ghostty:RGB"
set-option -sg escape-time 0
set-option -sg repeat-time 0
set-option -gq mouse-utf8 on
set-option -g mouse on
set-option -g prefix C-a
set-option -g visual-activity off
set-option -g set-titles on
set-option -g history-limit 50000
set-option -g display-time 4000

### Window Options
set-window-option -g monitor-activity on
set-window-option -g automatic-rename on
set-window-option -g pane-base-index 1
set-window-option -g mouse on
set-window-option -gq utf8 on
set-window-option -g mode-keys vi

### FZF launch key
set-environment -g TMUX_FZF_LAUNCH_KEY "C-l"

### Key Bindings
unbind-key C-b
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display "TMUX configuration is reloaded!"
bind c new-window -c '#{pane_current_path}'
bind T swap-window -t 1

bind "Escape" copy-mode
bind-key -T root DoubleClick1Pane  select-pane \; copy-mode \; send-keys -X select-word

bind | split-window
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

bind : command-prompt
### Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'roosta/tmux-pop'
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

set -g @scroll-without-changing-pane 'on'
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'
set -g @scroll-speed-num-lines-per-scroll '3'

### Plugins Options
set -g @extrakto_popup_size 70%

#### PowerKit

set -g @powerkit_plugins 'group(github,kubernetes),group(cpu,memory,gpu,netspeed,vpn),uptime'
set -g @powerkit_theme 'dracula'
set -g @powerkit_theme_variant "dark"
# set -g @powerkit_status_order "session,plugins,windows"
set -g @powerkit_elements_spacing "false"
set -g @powerkit_window_index_style "box"
set -g @powerkit_window_index_icons "true"
set -g @powerkit_edge_separator_style "rounded:all"
set -g @powerkit_pane_flash_enabled "true"
set -g @powerkit_pane_flash_duration "100"

# Group colors: dark purple (github), dark cyan (system metrics), dark orange, dark red, dark green
set -g @powerkit_plugin_group_colors "#3d2b5c,#1c4a52,#5c3b1e,#4a1c1c,#3b4a1c"
# Configure separator style
# Different style for edge separators
# set -g @powerkit_edge_separator_style "rounded:all"
set -g @powerkit_icon_padding "3"
set -g @powerkit_plugin_github_repos "marleyspoon/ramen_api,marleyspoon/ramen,jacopoms/guardian_low_data"
set -g @powerkit_plugin_github_token "$GITHUB_TOKEN"
set -g @powerkit_plugin_github_filter_user "jacopoms"
set -g @powerkit_plugin_github_format 'detailed'
set -g @powerkit_plugin_kubernetes_display_mode "always"
set -g @powerkit_plugin_kubernetes_show_context "true"
set -g @powerkit_plugin_kubernetes_show_namespace "true"
set -g @powerkit_plugin_kubernetes_warn_on_prod "true"
set -g @powerkit_plugin_kubernetes_prod_keywords "prod,production"
set -g @powerkit_plugin_kubernetes_keybinding_context "M-k"
set -g @powerkit_plugin_kubernetes_keybinding_namespace "M-n"
set -g @powerkit_plugin_netspeed_interface "auto"
set -g @powerkit_plugin_cpu_show_cores "true"
set -g @powerkit_plugin_network_format "both"
set -g @powerkit_keybinding_conflict_action "skip"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
#
run "~/.tmux/plugins/tpm/tpm"
